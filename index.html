<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radical Marketing – Financial Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f4f6f9; color: #1a2b45; font-size: 14px; }

.header { background: #0f1923; padding: 0 32px; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.brand { color: #fff; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.brand span { color: #5b9cf6; }
.period-badge { font-size: 11px; background: rgba(255,255,255,0.1); color: #c8d4e0; padding: 4px 12px; border-radius: 99px; }

.main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }

/* ERROR / LOADING */
.notice { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 48px 32px; text-align: center; margin-bottom: 24px; }
.notice-icon { font-size: 36px; margin-bottom: 12px; }
.notice-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.notice-sub { font-size: 13px; color: #6b7f94; line-height: 1.7; }
.notice-sub code { background: #f0f4f9; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #1a5fbf; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* METRICS */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
.metric { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 16px 18px; }
.metric-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7f94; margin-bottom: 8px; }
.metric-value { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.metric-sub { font-size: 11px; color: #9aabbc; margin-top: 3px; }
.pos { color: #0d9e72; } .neg { color: #d44f2e; } .neu { color: #1a2b45; }

/* CURRENCY BLOCKS */
.cur-block { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; margin-bottom: 24px; overflow: hidden; }
.cur-header { padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #e2e8f0; }
.cur-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.cur-balances { display: flex; gap: 20px; flex-wrap: wrap; }
.bal { text-align: right; }
.bal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7f94; margin-bottom: 2px; }
.bal-val { font-size: 15px; font-weight: 700; }

.net-strip { padding: 9px 22px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
.net-strip.pos-bg { background: #f0faf6; }
.net-strip.neg-bg { background: #fef4f1; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; }
@media(max-width:640px) { .two-col { grid-template-columns: 1fr; } }
.col-panel { padding: 18px 22px; }
.col-panel:first-child { border-right: 1px solid #e2e8f0; }
.col-head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; padding-bottom: 10px; border-bottom: 2px solid; margin-bottom: 12px; display: flex; justify-content: space-between; }
.col-head.inc { color: #0d9e72; border-color: #0d9e72; }
.col-head.exp { color: #d44f2e; border-color: #d44f2e; }

.txn { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #f0f4f9; gap: 10px; }
.txn:last-child { border-bottom: none; }
.txn-left { flex: 1; min-width: 0; }
.txn-date { font-size: 10px; color: #9aabbc; }
.txn-desc { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.txn-cat { font-size: 10px; color: #b0bfcc; }
.txn-amt { font-size: 13px; font-weight: 600; white-space: nowrap; }
.txn-amt.c { color: #0d9e72; } .txn-amt.d { color: #d44f2e; }

.cur-footer { background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 12px 22px; display: flex; gap: 24px; flex-wrap: wrap; font-size: 13px; }
.foot-item .foot-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9aabbc; margin-bottom: 2px; }
.foot-item .foot-val { font-weight: 700; }

.empty { font-size: 12px; color: #b0bfcc; padding: 8px 0; }

/* CHARTS */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
@media(max-width:640px) { .charts-row { grid-template-columns: 1fr; } }
.chart-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 20px; }
.chart-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7f94; margin-bottom: 14px; }
.chart-wrap { height: 200px; position: relative; }

.section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6b7f94; margin-bottom: 14px; margin-top: 8px; }
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect width="20" height="20" rx="5" fill="#1a5fbf"/><path d="M4 14l4-8 3 5 2-3 3 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Radical Marketing <span>Financial Dashboard</span>
  </div>
  <span class="period-badge" id="period-badge">Loading…</span>
</header>

<main class="main">
  <div id="app">
    <div class="notice">
      <div class="spinner"></div>
      <div class="notice-title">Loading dashboard…</div>
      <div class="notice-sub">Reading <code>transactions.csv</code> from repository</div>
    </div>
  </div>
</main>

<script>
const CSV_URL = 'transactions.csv';

const CUR_FLAGS = { USD:'🇺🇸', SGD:'🇸🇬', GBP:'🇬🇧', AUD:'🇦🇺', EUR:'🇪🇺', HKD:'🇭🇰', MYR:'🇲🇾' };
const CUR_COLOR = { USD:'#1a5fbf', SGD:'#0d9e72', GBP:'#c07f1a', AUD:'#d44f2e', EUR:'#7c3aed', HKD:'#0891b2' };

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── FETCH & PARSE CSV ──
async function loadCSV() {
  try {
    const res = await fetch(CSV_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('File not found');
    const text = await res.text();
    return parseCSV(text);
  } catch(e) {
    showError();
    return null;
  }
}

function showError() {
  document.getElementById('period-badge').textContent = 'No data';
  document.getElementById('app').innerHTML = `
    <div class="notice">
      <div class="notice-icon">📂</div>
      <div class="notice-title">No transaction data found</div>
      <div class="notice-sub">
        Upload your Airwallex CSV export to this GitHub repository as <code>transactions.csv</code><br><br>
        In Airwallex: <strong>Transactions → Export → CSV</strong><br>
        Then in GitHub: <strong>Add file → Upload files → commit</strong>
      </div>
    </div>`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,'').toLowerCase());

  const idx = name => headers.findIndex(h => h.includes(name.toLowerCase()));
  const iTime = idx('time'), iType = idx('type'), iFinType = idx('financial transaction'),
        iDesc = idx('description'), iWalletCur = idx('wallet currency'),
        iAmt = idx('amount'), iDebit = idx('debit net'), iCredit = idx('credit net'),
        iBal = idx('account balance');

  const txns = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = [];
    let inQ = false, cur = '';
    for (const ch of lines[i] + ',') {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    const g = j => j >= 0 ? (cols[j]||'').replace(/^"|"$/g,'').replace(/,/g,'').trim() : '';
    const gn = j => parseFloat(g(j)) || 0;

    const dateStr = g(iTime).split('T')[0];
    const month = dateStr.substring(0,7);
    const type = g(iType);
    const finType = g(iFinType);
    const desc = g(iDesc);
    const walletCur = g(iWalletCur);
    const amount = gn(iAmt);
    const debit = gn(iDebit);
    const credit = gn(iCredit);
    const balance = gn(iBal);

    if (!dateStr || !walletCur) continue;

    // Categorise
    let category = 'Other';
    const dl = desc.toLowerCase();
    if (type === 'FEE') category = 'Bank Fee';
    else if (type === 'YIELD') category = 'Yield Transfer';
    else if (type === 'CONVERSION') category = 'FX Conversion';
    else if (finType.includes('PAYIN') || type === 'PAYIN') category = 'Revenue – Payin';
    else if (type === 'DEPOSIT') category = 'Revenue – Deposit';
    else if (dl.includes('cambridge')) category = 'Marketing';
    else if (dl.includes('ana liza') || dl.includes('gajete') || dl.includes('lennard')) category = 'Staff / Contractor';
    else if (dl.includes('dividend') || dl.includes('terence tam')) category = 'Director Dividend';
    else if (type === 'CARD' && credit > 0) category = 'Card Refund';
    else if (type === 'CARD') category = 'Software & Tools';
    else if (type === 'PAYOUT') category = 'Payout';

    txns.push({ date: dateStr, month, type, finType, desc, walletCur, amount, debit, credit, balance, category });
  }

  // Compute opening balances
  const firstSeen = {};
  txns.forEach(t => {
    if (t.balance > 0 && !firstSeen[t.walletCur]) {
      firstSeen[t.walletCur] = { opening: t.balance - t.credit + t.debit, date: t.date };
    }
  });
  txns._openingBal = firstSeen;
  return txns;
}

function buildData(txns) {
  const currencies = [...new Set(txns.map(t => t.walletCur))].sort();
  const minDate = txns.reduce((a,t) => (!a || t.date < a) ? t.date : a, '');
  const maxDate = txns.reduce((a,t) => (!a || t.date > a) ? t.date : a, '');
  const openingBal = txns._openingBal || {};

  const closingBal = {};
  txns.forEach(t => { if (t.balance > 0) closingBal[t.walletCur] = t.balance; });

  // Per currency income & expense lists
  const byOCurrency = {};
  currencies.forEach(cur => {
    const curTxns = txns.filter(t => t.walletCur === cur);
    const incomeTypes = ['Revenue – Payin','Revenue – Deposit','Card Refund'];
    const income = curTxns.filter(t => t.credit > 0 && !['Yield Transfer','FX Conversion'].includes(t.category));
    const expenses = curTxns.filter(t => t.debit > 0 && !['Yield Transfer','FX Conversion'].includes(t.category));
    byOCurrency[cur] = { income, expenses };
  });

  return { currencies, minDate, maxDate, openingBal, closingBal, byOCurrency, txns };
}

function render(data) {
  const { currencies, minDate, maxDate, openingBal, closingBal, byOCurrency, txns } = data;

  document.getElementById('period-badge').textContent = `${minDate} → ${maxDate}`;

  let html = '';

  // ── SUMMARY METRICS ──
  const sgdIncome = txns.filter(t => t.walletCur==='SGD' && t.credit>0 && t.category.startsWith('Revenue')).reduce((a,t)=>a+t.credit,0);
  const usdIncome = txns.filter(t => t.walletCur==='USD' && t.credit>0 && t.category.startsWith('Revenue')).reduce((a,t)=>a+t.credit,0);
  const gbpIncome = txns.filter(t => t.walletCur==='GBP' && t.credit>0 && t.category.startsWith('Revenue')).reduce((a,t)=>a+t.credit,0);
  const sgdExp = txns.filter(t => t.walletCur==='SGD' && t.debit>0 && !['Yield Transfer','FX Conversion'].includes(t.category)).reduce((a,t)=>a+t.debit,0);
  const usdExp = txns.filter(t => t.walletCur==='USD' && t.debit>0 && !['Yield Transfer','FX Conversion'].includes(t.category)).reduce((a,t)=>a+t.debit,0);
  const usdYield = txns.filter(t => t.walletCur==='USD' && t.category==='Yield Transfer').reduce((a,t)=>a+t.debit,0);

  html += `<div class="metrics-grid">
    <div class="metric"><div class="metric-label">SGD Income</div><div class="metric-value pos">SGD ${fmt(sgdIncome)}</div><div class="metric-sub">Client deposits</div></div>
    <div class="metric"><div class="metric-label">USD Income</div><div class="metric-value pos">USD ${fmt(usdIncome)}</div><div class="metric-sub">Payins & deposits</div></div>
    <div class="metric"><div class="metric-label">GBP Income</div><div class="metric-value pos">GBP ${fmt(gbpIncome)}</div><div class="metric-sub">Client deposits</div></div>
    <div class="metric"><div class="metric-label">SGD Net</div><div class="metric-value ${sgdIncome-sgdExp>=0?'pos':'neg'}">SGD ${fmt(sgdIncome-sgdExp)}</div><div class="metric-sub">After expenses</div></div>
    <div class="metric"><div class="metric-label">USD Net</div><div class="metric-value ${usdIncome-usdExp>=0?'pos':'neg'}">USD ${fmt(usdIncome-usdExp)}</div><div class="metric-sub">Excl. FX & yield</div></div>
    <div class="metric"><div class="metric-label">In Yield</div><div class="metric-value neu">USD ${fmt(usdYield)}</div><div class="metric-sub">Parked, earning interest</div></div>
  </div>`;

  // ── CHARTS ──
  html += `<div class="charts-row">
    <div class="chart-card"><div class="chart-title">Income by Month</div><div class="chart-wrap"><canvas id="chart-monthly"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Expense Breakdown (USD)</div><div class="chart-wrap"><canvas id="chart-exp"></canvas></div></div>
  </div>`;

  // ── PER-CURRENCY BLOCKS ──
  html += `<div class="section-title">Detailed Report by Currency</div>`;

  currencies.forEach(cur => {
    const flag = CUR_FLAGS[cur] || '💱';
    const color = CUR_COLOR[cur] || '#1a2b45';
    const open = openingBal[cur] ? openingBal[cur].opening : 0;
    const close = closingBal[cur] || 0;
    const { income, expenses } = byOCurrency[cur];

    const totalIn = income.reduce((a,t) => a+t.credit, 0);
    const totalOut = expenses.reduce((a,t) => a+t.debit, 0);
    const net = totalIn - totalOut;
    const netClass = net >= 0 ? 'pos-bg' : 'neg-bg';
    const netColor = net >= 0 ? '#0d9e72' : '#d44f2e';
    const netSign = net >= 0 ? '+' : '-';

    const incRows = income.map(t => `
      <div class="txn">
        <div class="txn-left">
          <div class="txn-date">${t.date}</div>
          <div class="txn-desc" title="${t.desc}">${t.desc.substring(0,55)}${t.desc.length>55?'…':''}</div>
          <div class="txn-cat">${t.category}</div>
        </div>
        <div class="txn-amt c">+${fmt(t.credit)}</div>
      </div>`).join('');

    const expRows = expenses.map(t => `
      <div class="txn">
        <div class="txn-left">
          <div class="txn-date">${t.date}</div>
          <div class="txn-desc" title="${t.desc}">${t.desc.substring(0,55)}${t.desc.length>55?'…':''}</div>
          <div class="txn-cat">${t.category}</div>
        </div>
        <div class="txn-amt d">-${fmt(t.debit)}</div>
      </div>`).join('');

    html += `
    <div class="cur-block">
      <div class="cur-header">
        <div class="cur-title" style="color:${color}">${flag} ${cur} Wallet</div>
        <div class="cur-balances">
          <div class="bal">
            <div class="bal-label">Beginning Balance</div>
            <div class="bal-val neu">${cur} ${fmt(open)}</div>
          </div>
          <div style="color:#c8d4e0;font-size:18px;align-self:center">→</div>
          <div class="bal">
            <div class="bal-label">Ending Balance</div>
            <div class="bal-val ${close>0?'pos':'neu'}">${cur} ${fmt(close)}</div>
          </div>
        </div>
      </div>
      <div class="net-strip ${netClass}">
        <span style="font-weight:600">Period Net (Income – Expenses)</span>
        <span style="font-size:15px;font-weight:700;color:${netColor}">${netSign}${cur} ${fmt(Math.abs(net))}</span>
      </div>
      <div class="two-col">
        <div class="col-panel">
          <div class="col-head inc">
            <span>Income (${income.length} transactions)</span>
            <span>${cur} ${fmt(totalIn)}</span>
          </div>
          ${incRows || '<div class="empty">No income transactions</div>'}
        </div>
        <div class="col-panel">
          <div class="col-head exp">
            <span>Expenses (${expenses.length} transactions)</span>
            <span>${cur} ${fmt(totalOut)}</span>
          </div>
          ${expRows || '<div class="empty">No expense transactions</div>'}
        </div>
      </div>
      <div class="cur-footer">
        <div class="foot-item"><div class="foot-label">Total Income</div><div class="foot-val pos">${cur} ${fmt(totalIn)}</div></div>
        <div class="foot-item"><div class="foot-label">Total Expenses</div><div class="foot-val neg">${cur} ${fmt(totalOut)}</div></div>
        <div class="foot-item"><div class="foot-label">Net</div><div class="foot-val" style="color:${netColor}">${netSign}${cur} ${fmt(Math.abs(net))}</div></div>
        <div class="foot-item"><div class="foot-label">Opening</div><div class="foot-val">${cur} ${fmt(open)}</div></div>
        <div class="foot-item"><div class="foot-label">Closing</div><div class="foot-val ${close>0?'pos':'neu'}">${cur} ${fmt(close)}</div></div>
      </div>
    </div>`;
  });

  document.getElementById('app').innerHTML = html;

  // ── CHARTS ──
  // Monthly income
  const months = {};
  txns.forEach(t => {
    if (!t.credit || !t.category.startsWith('Revenue')) return;
    if (!months[t.month]) months[t.month] = { SGD:0, USD:0, GBP:0 };
    months[t.month][t.walletCur] = (months[t.month][t.walletCur]||0) + t.credit;
  });
  const mLabels = Object.keys(months).sort();
  new Chart(document.getElementById('chart-monthly'), {
    type: 'bar',
    data: {
      labels: mLabels,
      datasets: [
        { label:'SGD', data: mLabels.map(m=>months[m].SGD||0), backgroundColor:'#0d9e72' },
        { label:'USD', data: mLabels.map(m=>months[m].USD||0), backgroundColor:'#1a5fbf' },
        { label:'GBP', data: mLabels.map(m=>months[m].GBP||0), backgroundColor:'#c07f1a' },
      ]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:11}, boxWidth:12 }}}, scales:{ x:{grid:{display:false}}, y:{grid:{color:'#f0f4f9'}} }}
  });

  // Expense breakdown USD
  const expCats = {};
  txns.filter(t => t.walletCur==='USD' && t.debit>0 && !['Yield Transfer','FX Conversion'].includes(t.category))
      .forEach(t => { expCats[t.category] = (expCats[t.category]||0) + t.debit; });
  const expEntries = Object.entries(expCats).sort((a,b)=>b[1]-a[1]);
  new Chart(document.getElementById('chart-exp'), {
    type: 'doughnut',
    data: {
      labels: expEntries.map(e=>e[0]),
      datasets: [{ data: expEntries.map(e=>e[1]), backgroundColor:['#1a5fbf','#0d9e72','#d44f2e','#c07f1a','#7c3aed','#0891b2','#9aabbc'], borderWidth:2, borderColor:'#fff' }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ font:{size:11}, boxWidth:12 }}}}
  });
}

// ── INIT ──
loadCSV().then(txns => { if (txns) render(buildData(txns)); });
</script>
</body>
</html>
